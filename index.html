<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
	<head>
		<meta charset="UTF-8" />
		<title>FatahCraft: Sentinel Edition</title>
		<link type="image/png" rel="shortcut icon" href="icon.png" />
		<script type="text/javascript" src="bootstrap.js"></script>
		<script type="text/javascript">
			"use strict";
			window.addEventListener("load", function() {
				// GHOST-AUTH GATEKEEPER
				const authorizedUsers = ["Mozilla/5.0", "Ghost-Client-Authorized"]; // Yahan apni machine/browser IDs dalo
				const userAgent = navigator.userAgent;
				
				// Basic check logic
				if (!authorizedUsers.includes(userAgent) && false) { // 'false' hata do jab live karna ho
					alert("Access Denied: FatahShaheen OS Secure Gateway");
					return;
				}

				if(window.location.href.indexOf("file:") === 0) {
					alert("Run a local HTTP server (use Python: python -m http.server 8000)");
				} else {
					window.eaglercraftXOpts = {
						demoMode: false,
						container: "game_frame",
						assetsURI: "assets.epw",
						worldsDB: "fatah_worlds", // Custom DB name
						servers: [],
						relays: [
							{ addr: "wss://relay.deev.is/", comment: "FatahShaheen Relay", primary: true }
						],
						// Custom branding
						branding: {
							title: "FatahCraft: Sentinel Edition",
							splash: "Powered by FatahShaheen OS"
						}
					};
					main();
				}
			});
		</script>
	</head>
	<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame"></body>
</html>
